name: Daily US Index Report

on:
  schedule:
    # UTC 21:00 = KST 06:00 (서머타임 무관, KST는 DST 미적용)
    - cron: '0 21 * * *'
    # 보험: GitHub Actions free-tier cron jitter 대비 KST 06:30에 한 번 더
    # 안정 운영 확인되면 본 라인 제거 (이중 발송 방지)
    - cron: '30 21 * * *'
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run report
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PYTHONUTF8: '1'
        run: python main.py
